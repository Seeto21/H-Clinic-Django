{% extends 'bookings/base.html' %}

{% block content %}
<div class="glass-container" style="max-width: 450px; margin-top: 100px;">
    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 10px; font-weight: 700;">Welcome Back</h2>
    <p style="text-align: center; color: #7f8c8d; margin-bottom: 30px;">Access your medical dashboard</p>

    <form method="POST">
        {% csrf_token %}
        <style>
            /* This styles the inputs generated by form.as_p */
            form p label {
                display: block;
                font-weight: 600;
                margin-bottom: 5px;
                color: #34495e;
            }
            form p input {
                width: 100%;
                padding: 10px;
                border: 1px solid #dcdde1;
                border-radius: 6px;
                transition: 0.3s;
            }
            form p input:focus {
                border-color: #3498db;
                outline: none;
                box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
            }
            /* Styling for error messages if login fails */
            .errorlist {
                color: #e74c3c;
                list-style: none;
                padding: 0;
                font-size: 14px;
                font-weight: bold;
            }
        </style>

        <div style="margin-bottom: 20px;">
            {{ form.as_p }}
        </div>
        
        <div style="text-align: center; margin-top: 10px;">

            <button type="submit" class="btn-custom" style="border: none; min-width: 150px; cursor: pointer;">
        Log In
    </button>
</div>
    </form>

    <div style="text-align: center; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px;">
        <p style="color: #636e72;">New to our clinic? 
            <a href="{% url 'register' %}" style="color: #3498db; text-decoration: none; font-weight: bold; border-bottom: 2px solid transparent; transition: 0.3s;" 
               onmouseover="this.style.borderBottom='2px solid #3498db'" 
               onmouseout="this.style.borderBottom='2px solid transparent'">
               Create an Account
            </a>
        </p>
    </div>
</div>
{% endblock %}
