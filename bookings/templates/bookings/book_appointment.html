{% extends 'bookings/base.html' %}

{% block content %}
<div class="glass-container" style="max-width: 600px; margin-top: 50px;">
    <h2 style="color: #2c3e50; font-weight: 700; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px;">
        Schedule Your Visit
    </h2>

    <form method="POST">
        {% csrf_token %}
        
        <style>
            /* Ensures labels are dark and visible */
            form p label {
                display: block;
                font-weight: 600;
                color: #34495e;
                margin-bottom: 8px;
            }
            /* Gives inputs a white background and clear borders */
            form p input, form p select, form p textarea {
                background-color: white !important;
                border: 1px solid #dcdde1 !important;
                color: #2c3e50 !important;
                padding: 10px !important;
                width: 100%;
                border-radius: 6px;
            }
            /* Removes the default fieldset border which looks dated */
            fieldset {
                border: none;
                padding: 0;
                margin: 0;
            }
        </style>

        <fieldset>
            {{ form.as_p }}
            
            <div style="text-align: center; margin-top: 20px;">
                <button type="submit" class="btn-custom" style="width: 100%; border: none; cursor: pointer;">
                    Confirm Booking
                </button>
            </div>
        </fieldset>
    </form>
</div>
{% endblock %}
