{% extends 'bookings/base.html' %}

{% block content %}
<div style="
    /* The Breakout Trick */
    position: relative;
    width: 100vw;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    
    /* Height and Background */
    height: 100vh;
    margin-top: -20px; /* Adjust this if there is a gap at the top */
    background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(44, 62, 80, 0.6)), 
                url('https://images.unsplash.com/photo-1629909613654-28e377c37b09?q=80&w=1168&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    /* Content Alignment */
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
">
    <div style="animation: fadeInUp 1s ease-out; padding: 20px;">
        <h1 style="font-size: 4rem; font-weight: 800; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">
            Your Health, Our Priority
        </h1>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">
            World-class healthcare at your fingertips.
        </p>
        <div style="display: flex; gap: 20px; justify-content: center;">
            <a href="{% url 'register' %}" class="btn-custom">Get Started</a>
            <a href="{% url 'login' %}" class="btn-custom" style="background: rgba(255,255,255,0.1); border: 2px solid white;">Member Login</a>
        </div>
    </div>
</div>
{% endblock %}
